name: Deploy to Cloudflare Pages

# 運用は main への直 push が基本（push → build → deploy）。
# pull_request トリガーはビルド検証のみ行い、デプロイしない（Renovate の依存更新 PR をマージ前に検証するため）
#
# 必要 secrets:
#   - CLOUDFLARE_API_TOKEN
#     - 名前: `zenshin-tech / Pages Deploy`（Account-owned・Pages Write のみ）
#     - **Token と GitHub Actions Secret は zenshin-infra で Terraform 管理**
#       (zenshin-infra/terraform/cloudflare/cloudflare-tokens.tf §O)。本リポでは手動編集禁止
#   - CLOUDFLARE_ACCOUNT_ID は Org 変数（vars）を使用
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ビルドスクリプトは Bun で実行し、marp-cli は Node API（marpCli）として同プロセスで動かす
      # Node.js はフォールバック用に維持
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # PDF・サムネイル生成時の日本語フォント
      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: 依存関係のインストール
        run: bun install --frozen-lockfile

      - name: Typecheck & Build
        run: bun run ci

      - name: Cloudflare Pages へデプロイ
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zenshin-tech --commit-dirty=true --branch=main
